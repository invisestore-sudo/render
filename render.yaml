services:
  - type: web
    name: invisestore-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node --dns-result-order=ipv4first server.js
    envVars:
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
    # Disco persistente (US$ 1/mês). Comente as linhas abaixo se quiser
    # rodar 100% grátis (mas pedidos/chaves serão apagados a cada redeploy).
